<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedGemma 智能诊疗系统</title>
    <!-- Runtime config: API base URL -->
    <script src="/env-config.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        medical: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            500: '#10b981',
                            600: '#059669',
                            900: '#064e3b',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <style>
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col">
    <div id="app" class="w-full h-full flex flex-col relative overflow-hidden">
        <app-header></app-header>
        <main class="flex-1 flex overflow-hidden relative">
            <history-sidebar></history-sidebar>
            <chat-view v-if="currentView === 'chat'"></chat-view>
            <ct-view v-if="currentView === 'ct'"></ct-view>
            <settings-panel></settings-panel>
        </main>
        <image-modal></image-modal>
        <floating-image></floating-image>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
